name: Pump
category: Equipment
description: Process pump for fluid transfer and circulation.

required_signals:
  - name: Start Command
    signal_type: DO
  - name: Run Feedback
    signal_type: DI
  - name: Fault Feedback
    signal_type: DI

optional_signals:
  - name: Reset
    signal_type: DO
  - name: Local/Remote Mode
    signal_type: DI
    description: "0 = Local, 1 = Remote"
