name: Pump
category: Equipment
description: Process pump for fluid transfer and circulation.

# Ordered list controls Device Signals creation order.
# Address assignment preserves this order within each I/O type.
signals:
  - name: Start Command
    signal_type: DO
    required: true
  - name: Stop Command
    signal_type: DO
    required: false
  - name: Local/Remote Mode
    signal_type: DI
    required: false
    description: "0 = Local, 1 = Remote"
  - name: Run Feedback
    signal_type: DI
    required: true
  - name: Fault Feedback
    signal_type: DI
    required: true
